name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          crate_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version." >&2
            echo "Bump Cargo.toml (and commit) before tagging." >&2
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          staging="netspd-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$staging/completions"
          bin="target/${{ matrix.target }}/release/netspd"
          cp "$bin" "$staging/"
          cp README.md LICENSE "$staging/"
          # Completions and man page, generated by the binary itself.
          # Cross-compiled mac x86_64 binaries may not run on arm
          # runners; skip quietly in that case.
          if "$bin" --version >/dev/null 2>&1; then
            for shell in bash zsh fish; do
              "$bin" completions "$shell" > "$staging/completions/netspd.$shell"
            done
            "$bin" man > "$staging/netspd.1"
          fi
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "netspd-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/netspd.exe" $staging
          Copy-Item README.md, LICENSE $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true

  linux-packages:
    name: build .deb and .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools and packagers
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          cargo install cargo-deb cargo-generate-rpm --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-packages

      - name: Build packages
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          cargo deb --no-build --target x86_64-unknown-linux-musl
          cargo generate-rpm --target x86_64-unknown-linux-musl

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/x86_64-unknown-linux-musl/debian/*.deb
            target/x86_64-unknown-linux-musl/generate-rpm/*.rpm
          generate_release_notes: true

  packaging:
    name: update packaging checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update packaging manifests
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          win_sha=$(curl -fsSL "$base/netspd-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip" | sha256sum | cut -d' ' -f1)
          src_sha=$(curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" | sha256sum | cut -d' ' -f1)

          # Scoop manifest (JSON, rewritten structurally).
          python3 - "$version" "$win_sha" <<'PY'
          import json, sys
          version, sha = sys.argv[1], sys.argv[2]
          path = "packaging/scoop/netspd.json"
          with open(path) as f:
              m = json.load(f)
          m["version"] = version
          m["url"] = f"https://github.com/TarunVishwakarma1/netspd/releases/download/v{version}/netspd-v{version}-x86_64-pc-windows-msvc.zip"
          m["hash"] = sha
          m["extract_dir"] = f"netspd-v{version}-x86_64-pc-windows-msvc"
          with open(path, "w") as f:
              json.dump(m, f, indent=4)
              f.write("\n")
          PY

          # winget manifests.
          upper_sha=$(echo "$win_sha" | tr 'a-f' 'A-F')
          sed -i -E \
            -e "s/^PackageVersion: .*/PackageVersion: ${version}/" \
            packaging/winget/*.yaml
          sed -i -E \
            -e "s|(InstallerUrl: ).*|\1https://github.com/TarunVishwakarma1/netspd/releases/download/v${version}/netspd-v${version}-x86_64-pc-windows-msvc.zip|" \
            -e "s/(InstallerSha256: ).*/\1${upper_sha}/" \
            -e "s|(RelativeFilePath: ).*|\1netspd-v${version}-x86_64-pc-windows-msvc\\\\netspd.exe|" \
            packaging/winget/TarunVishwakarma1.netspd.installer.yaml
          sed -i -E \
            "s|(manifests/t/TarunVishwakarma1/netspd/).*(/)|\1${version}\2|" \
            packaging/winget/TarunVishwakarma1.netspd.yaml || true

          # AUR PKGBUILD.
          sed -i -E \
            -e "s/^pkgver=.*/pkgver=${version}/" \
            -e "s/^sha256sums=.*/sha256sums=('${src_sha}')/" \
            packaging/aur/PKGBUILD

          # GitHub Action default version.
          sed -i -E "s/(default: \")v[0-9]+\.[0-9]+\.[0-9]+(\")/\1${GITHUB_REF_NAME}\2/" \
            packaging/github-action/action.yml

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging
          if git diff --cached --quiet; then
            echo "packaging unchanged"
            exit 0
          fi
          git commit -m "chore: packaging checksums for ${GITHUB_REF_NAME}"
          git push origin main

  winget-submit:
    name: submit to winget
    needs: packaging
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: TarunVishwakarma1.netspd
          version: ${{ github.ref_name }}
          release-tag: ${{ github.ref_name }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

  homebrew:
    name: update homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v7
        with:
          repository: TarunVishwakarma1/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Regenerate formula with release checksums
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          sha() {
            curl -fsSL "$base/netspd-${GITHUB_REF_NAME}-$1.tar.gz" | sha256sum | cut -d' ' -f1
          }
          sha_mac_arm=$(sha aarch64-apple-darwin)
          sha_mac_x86=$(sha x86_64-apple-darwin)
          sha_linux=$(sha x86_64-unknown-linux-musl)

          mkdir -p Formula
          cat > Formula/netspd.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Homebrew formula for netspd, installing prebuilt release binaries.
          # Generated by netspd's release workflow — do not edit by hand.
          class Netspd < Formula
            desc "Beautiful network speed test for the terminal, with a hypercar tachometer"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$base/netspd-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_mac_arm}"
              else
                url "$base/netspd-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_mac_x86}"
              end
            end

            on_linux do
              url "$base/netspd-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz"
              sha256 "${sha_linux}"
            end

            def install
              bin.install "netspd"
              if File.exist?("netspd.1")
                man1.install "netspd.1"
                bash_completion.install "completions/netspd.bash" => "netspd"
                zsh_completion.install "completions/netspd.zsh" => "_netspd"
                fish_completion.install "completions/netspd.fish"
              end
            end

            test do
              assert_match "netspd #{version}", shell_output("#{bin}/netspd --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/netspd.rb
          if git diff --cached --quiet; then
            echo "formula unchanged"
            exit 0
          fi
          git commit -m "netspd ${GITHUB_REF_NAME}"
          git push
