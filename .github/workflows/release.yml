name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          staging="netspd-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/netspd" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "netspd-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/netspd.exe" $staging
          Copy-Item README.md, LICENSE $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true

  homebrew:
    name: update homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: TarunVishwakarma1/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Regenerate formula with release checksums
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          sha() {
            curl -fsSL "$base/netspd-${GITHUB_REF_NAME}-$1.tar.gz" | sha256sum | cut -d' ' -f1
          }
          sha_mac_arm=$(sha aarch64-apple-darwin)
          sha_mac_x86=$(sha x86_64-apple-darwin)
          sha_linux=$(sha x86_64-unknown-linux-musl)

          mkdir -p Formula
          cat > Formula/netspd.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Homebrew formula for netspd, installing prebuilt release binaries.
          # Generated by netspd's release workflow — do not edit by hand.
          class Netspd < Formula
            desc "Beautiful network speed test for the terminal, with a hypercar tachometer"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$base/netspd-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_mac_arm}"
              else
                url "$base/netspd-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_mac_x86}"
              end
            end

            on_linux do
              url "$base/netspd-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz"
              sha256 "${sha_linux}"
            end

            def install
              bin.install "netspd"
            end

            test do
              assert_match "netspd #{version}", shell_output("#{bin}/netspd --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/netspd.rb
          if git diff --cached --quiet; then
            echo "formula unchanged"
            exit 0
          fi
          git commit -m "netspd ${GITHUB_REF_NAME}"
          git push
